x-backend-image: &backend-image cloudpulse-backend:local
x-backend-build: &backend-build
  context: ./backend
  dockerfile: Dockerfile
x-backend-environment: &backend-environment
  DATABASE_URL: "postgresql+psycopg://${POSTGRES_USER:-cloudpulse}:${POSTGRES_PASSWORD:-cloudpulse}@postgres:5432/${POSTGRES_DB:-cloudpulse}"
  REDIS_URL: "redis://redis:6379/0"
  REDIS_QUEUE_NAME: "${REDIS_QUEUE_NAME:-monitor_checks}"
  WORKER_QUEUE_TIMEOUT_SECONDS: "${WORKER_QUEUE_TIMEOUT_SECONDS:-5}"
  SCHEDULER_POLL_INTERVAL_SECONDS: "${SCHEDULER_POLL_INTERVAL_SECONDS:-10}"
  ENVIRONMENT: "${ENVIRONMENT:-docker}"
  CORS_ORIGINS: '${CORS_ORIGINS:-["http://localhost:3000","http://127.0.0.1:3000","http://localhost:5173","http://127.0.0.1:5173"]}'

services:
  frontend:
    image: cloudpulse-frontend:local
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "${VITE_API_BASE_URL:-http://localhost:${API_PORT:-8000}}"
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: *backend-image
    build: *backend-build
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    environment: *backend-environment
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: *backend-image
    build: *backend-build
    command: python -m app.worker
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  scheduler:
    image: *backend-image
    build: *backend-build
    command: python -m app.scheduler
    environment: *backend-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-cloudpulse}"
      POSTGRES_USER: "${POSTGRES_USER:-cloudpulse}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-cloudpulse}"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-cloudpulse} -d ${POSTGRES_DB:-cloudpulse}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  postgres_data:
