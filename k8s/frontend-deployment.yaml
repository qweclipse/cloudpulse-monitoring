apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  labels:
    app.kubernetes.io/name: cloudpulse
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: cloudpulse
data:
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_pass http://api-service:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app.kubernetes.io/name: cloudpulse
    app.kubernetes.io/component: frontend
    app.kubernetes.io/part-of: cloudpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudpulse
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudpulse
        app.kubernetes.io/component: frontend
        app.kubernetes.io/part-of: cloudpulse
    spec:
      containers:
        - name: frontend
          image: cloudpulse-frontend:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: frontend-nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: frontend-nginx-config
          configMap:
            name: frontend-nginx-config
