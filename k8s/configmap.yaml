apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudpulse-config
  labels:
    app.kubernetes.io/name: cloudpulse
    app.kubernetes.io/part-of: cloudpulse
data:
  POSTGRES_DB: cloudpulse
  POSTGRES_USER: cloudpulse
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_URL: redis://redis:6379/0
  REDIS_QUEUE_NAME: monitor_checks
  WORKER_QUEUE_TIMEOUT_SECONDS: "5"
  SCHEDULER_POLL_INTERVAL_SECONDS: "10"
  ENVIRONMENT: kubernetes
