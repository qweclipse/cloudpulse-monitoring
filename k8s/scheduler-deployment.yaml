apiVersion: apps/v1
kind: Deployment
metadata:
  name: scheduler
  labels:
    app.kubernetes.io/name: cloudpulse
    app.kubernetes.io/component: scheduler
    app.kubernetes.io/part-of: cloudpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudpulse
      app.kubernetes.io/component: scheduler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudpulse
        app.kubernetes.io/component: scheduler
        app.kubernetes.io/part-of: cloudpulse
    spec:
      initContainers:
        - name: wait-for-api
          image: cloudpulse-backend:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - |
              until python -c "import urllib.request; urllib.request.urlopen('http://api-service:8000/health', timeout=3)"; do
                echo "waiting for api-service"
                sleep 2
              done
      containers:
        - name: scheduler
          image: cloudpulse-backend:local
          imagePullPolicy: IfNotPresent
          command:
            - python
            - -m
            - app.scheduler
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudpulse-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: REDIS_URL
            - name: REDIS_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: REDIS_QUEUE_NAME
            - name: WORKER_QUEUE_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: WORKER_QUEUE_TIMEOUT_SECONDS
            - name: SCHEDULER_POLL_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: SCHEDULER_POLL_INTERVAL_SECONDS
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: ENVIRONMENT
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
