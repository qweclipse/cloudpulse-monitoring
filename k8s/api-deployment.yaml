apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  labels:
    app.kubernetes.io/name: cloudpulse
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: cloudpulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: cloudpulse
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: cloudpulse
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: cloudpulse
    spec:
      containers:
        - name: api
          image: cloudpulse-backend:local
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
          args:
            - alembic upgrade head &&
              uvicorn app.main:app --host 0.0.0.0 --port 8000
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: POSTGRES_DB
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: cloudpulse-secret
                  key: POSTGRES_PASSWORD
            - name: DATABASE_URL
              value: postgresql+psycopg://$(POSTGRES_USER):$(POSTGRES_PASSWORD)@postgres:5432/$(POSTGRES_DB)
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: REDIS_URL
            - name: REDIS_QUEUE_NAME
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: REDIS_QUEUE_NAME
            - name: WORKER_QUEUE_TIMEOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: WORKER_QUEUE_TIMEOUT_SECONDS
            - name: SCHEDULER_POLL_INTERVAL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: SCHEDULER_POLL_INTERVAL_SECONDS
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: cloudpulse-config
                  key: ENVIRONMENT
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
